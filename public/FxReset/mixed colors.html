<!DOCTYPE html>
<html lang="en" class="h-full bg-[#F8F9FA]">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Evality - Blue Master Layout</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            ev: {
              blue: '#0C66E4',
              blueHover: '#0052CC',
              indigo: '#635BFF',
              slate: '#0A2540',
              steel: '#4F5B66',
              subtle: '#8C8F97',
              borderClean: '#E6E8EB',
              canvas: '#F8F9FA'
            }
          },
          boxShadow: {
            'premium-modal': '0 50px 100px -20px rgba(50, 50, 93, 0.12), 0 30px 60px -30px rgba(0, 0, 0, 0.15)'
          }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; }
  </style>
</head>
<body class="h-full flex items-center justify-center bg-ev-canvas p-6 antialiased">

  <!-- THE USER POPUP CARD -->
  <div class="w-full max-w-[440px] bg-white rounded-2xl p-9 shadow-premium-modal border border-ev-borderClean">

    <!-- BRANDING & TOP ACCENT NOTIFICATION -->
    <div class="mb-7">

      <!-- STRIPE INDIGO USED AS RARE PREMIUM ACCENT (New features or highlights) -->
      <div class="mb-5 inline-flex items-center gap-2 rounded-md bg-[#635BFF]/8 px-3 py-1.5 border border-ev-indigo/15">
        <span class="inline-block h-2 w-2 rounded-full bg-ev-indigo"></span>
        <span class="text-xs font-semibold text-ev-indigo tracking-tight">New: V4 Matrix Isolation Engine Live</span>
      </div>

      <div class="h-10 w-10 rounded-xl bg-ev-blue flex items-center justify-center font-bold text-white text-lg shadow-sm mb-4">
        E
      </div>
      <h1 class="text-2xl font-bold tracking-tight text-ev-slate">Initialize Node Control</h1>
      <p class="text-[15px] text-ev-steel mt-1.5 leading-relaxed">Enter your development credentials to spin up active workspace layouts.</p>
    </div>

    <!-- FORM FIELD CONTAINER -->
    <form class="space-y-5" onsubmit="event.preventDefault();">
      <div>
        <label class="block text-[13px] font-semibold text-ev-slate uppercase tracking-wider mb-2">Workspace Identifier</label>
        <input type="text" placeholder="core-dev-engine" style="font-size: 15px;" class="w-full rounded-lg border border-ev-borderClean px-4 py-2.5 text-ev-slate placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-ev-blue/15 focus:border-ev-blue transition-all" />
      </div>

      <div>
        <div class="flex items-center justify-between mb-2">
          <label class="block text-[13px] font-semibold text-ev-slate uppercase tracking-wider">Secret Keyphrase</label>
          <!-- Text Link using Atlassian Blue for interactivity -->
          <a href="#" style="font-size: 14px;" class="font-medium text-ev-blue hover:text-ev-blueHover transition-colors">Forgot?</a>
        </div>
        <input type="password" placeholder="••••••••••••" style="font-size: 15px;" class="w-full rounded-lg border border-ev-borderClean px-4 py-2.5 text-ev-slate placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-ev-blue/15 focus:border-ev-blue transition-all" />
      </div>

      <!-- MAIN ACTION BUTTON - NOW FULLY POWERED BY ATLASSIAN BLUE -->
      <button type="submit" style="font-size: 15px;" class="w-full mt-2 rounded-lg bg-ev-blue py-3 font-semibold text-white shadow-sm hover:bg-ev-blueHover active:scale-[0.99] transition-all">
        Authenticate System Access
      </button>
    </form>

    <!-- HORIZONTAL SEPARATOR -->
    <div class="relative my-6">
      <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-ev-borderClean"></div></div>
      <div class="relative flex justify-center text-[11px] uppercase font-bold tracking-widest"><span class="bg-white px-2 text-ev-subtle">Deployment Registry</span></div>
    </div>

    <!-- RE-ARRANGED SECONDARY BUTTON HIGHLIGHT (Indigo used selectively for alternative callouts) -->
    <div class="space-y-2.5">
      <button style="font-size: 14px;" class="w-full flex items-center justify-center gap-2 rounded-lg border border-ev-borderClean bg-ev-canvas py-2.5 font-medium text-ev-slate hover:bg-gray-100 transition-all">
        Standard Federated Login
      </button>
    </div>

  </div>

</body>
</html>
