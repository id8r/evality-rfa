<!DOCTYPE html>
<html lang="en" class="h-full bg-[#F8F8F8]">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Evality - Project Workspace</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            // Mapping your exact Atlassian JSON colors
            att: {
              bgLight: '#F8F8F8',
              bgRow: '#F0F1F2',
              white: '#FFFFFF',
              black: '#000000',
              textDark: '#101010',
              textNav: '#101214',
              textMuted: '#42526E',
              textLight: '#63666B',
              textSubtle: '#8C8F97',
              borderLight: '#C1C7D0',
              borderMuted: '#CCCCCC',
              bluePrimary: '#0C66E4',
              blueHover: '#1868DB',
              blueActive: '#1558BC',
              blueLight: '#CFE1FD',
              blueSoft: '#ADD8E6',
              green: '#82B536',
              amber: '#FFAB00',
              amberDark: '#FCA700',
              purple: '#BF63F3',
              darkBg: '#242528',
              darkCard: '#292A2E',
              darkNav: '#1C2B42'
            }
          },
          boxShadow: {
            // Stripe's signature multi-layered, smooth elevation shadows
            'stripe-sm': '0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04)',
            'stripe-md': '0 4px 6px -1px rgba(50,50,93,0.08), 0 1px 3px -1px rgba(0,0,0,0.05)',
            'stripe-lg': '0 15px 35px rgba(50,50,93,0.05), 0 5px 15px rgba(0,0,0,0.04)',
            'stripe-sheet': '-10px 0 30px rgba(0,0,0,0.03), -2px 0 8px rgba(0,0,0,0.02)'
          }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; }
    /* Custom thin border line to match Stripe's 0.5px / transparent inset feel */
    .stripe-border { border: 1px solid rgba(66, 82, 110, 0.08); }
    .stripe-border-b { border-bottom: 1px solid rgba(66, 82, 110, 0.08); }
    .stripe-border-r { border-right: 1px solid rgba(66, 82, 110, 0.08); }
  </style>
</head>

        <nav class="hidden md:flex items-center gap-6 text-sm font-medium text-[#42526E]">

          <a href="#" class="hover:text-[#101214] py-4 px-1 transition-colors">Evaluations</a>

              <p class="text-xs text-[#63666B] mt-0.5">Track, configure, and execute testing vectors against active environments.</p>
            </div>

            <div class="flex items-center gap-3
